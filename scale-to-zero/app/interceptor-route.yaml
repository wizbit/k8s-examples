apiVersion: http.keda.sh/v1beta1
kind: InterceptorRoute
metadata:
  name: sample-app
  namespace: example
spec:
  target:
    service: sample-app
    port: 80
  rules:
    - hosts:
        - scale.docker.localhost
  scalingMetric:
    requestRate:
      targetValue: 5
      window: 1m
      granularity: 1s