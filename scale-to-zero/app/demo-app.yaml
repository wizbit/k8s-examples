apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: example
spec:
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: traefik/whoami
          args: ["--port=8080"]
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sample-app
  namespace: example
spec:
  selector:
    app: sample-app
  ports:
    - port: 80
      targetPort: 8080